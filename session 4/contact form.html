<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="contact form">
    <title>PORTFOLIO WITH CONTACT FORM</title>
</head>
<body>
     <h2>CONTACT</h2>
<FORM action="success.html">
<label for="">ENTER YOUR NAME</label>
<input type="text" placeholder="Name" required>  <br><br>


<label for="">Date of birth</label>
<input type="date"><br><br>


<label for="">Enter Your Gender</label>
<input name="Gender" type="radio" required>Male
<input name="Gender" type="radio">Female
<input name="Gender" type="radio">Others
<br><br>


<label for="">ENTER YOUR EMAIL</label>
<input type="email" placeholder="xxxxx@email.com" required><br><br>
 <label for="">ENTER YOUR PHONE NUMBER</label>
<input type="number" placeholder="000000000"><br><br>
<label for="">ENTER YOUR ADDRESS</label>
<textarea rows="6" id="" ></textarea><br><br>
<label for="">YOUR AGE</label>
<input type="range" min="0" max="100"><br><br>
<label for="">SELECT YOUR CITY FOR LIVE MEETING</label>
<select name="" id="">
<option value="">select city</option>
<option value="">CHENNAI</option>
<option value="">TRICHY</option>
<option value="">MADURAI</option>
<option value="">BENGALURU</option>
<option value="">MUMBAI</option>
<option value="">DELHI</option>
</select>
<br><br>


<label for="">APPOINMENT TIME PREFFERED</label>
<input type="time"><br><br>
<button>LET'S CONNECT</button>

</body>
</html>
