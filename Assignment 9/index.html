<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="product page">
     <link rel="stylesheet" href="style.css">
    <title>product management map</title>
</head>
<body>
     <h1>Product Management App</h1>

  <!-- Search -->
  <input type="text" id="search" placeholder="Search products by title">

  <!-- Product Form -->
  <form id="productForm">
    <input type="hidden" id="productId"><br><br>

    <input type="text" id="title" placeholder="Title" required><br><br>
    <input type="number" id="price" placeholder="Price" required><br><br>
    <input type="text" id="category" placeholder="Category" required><br><br>
    <input type="text" id="image" placeholder="Image URL" required><br><br>
    <textarea id="description" placeholder="Description"></textarea><br><br>

    <button type="submit">Save Product</button><br><br>
  </form>

  <!-- Status Message -->
  <p id="status"></p>

  <!-- Product Display -->
  <div id="productList"></div>
  <script src="script.js"></script>
</body>
</html>
